inboundCall:
  name: Account Balance Bot Flow
  division: Home
  startUpRef: "/inboundCall/states/state[Initial State_10]"
  defaultLanguage: en-us
  supportedLanguages:
    en-us:
      defaultLanguageSkill:
        noValue: true
  settingsActionDefaults:
    callData:
      processingPrompt:
        noValue: true
  settingsErrorHandling:
    errorHandling:
      disconnect:
        none: true
  states:
    - state:
        name: Initial State
        refId: Initial State_10
        actions:
          - callGuide:
              name: Call AI Guide
              guideId: ${guide_id}
              inputVariables:
                - name: ${input_variable}
                  value:
                    exp: Flow.accountNumber
              outputVariables:
                - name: ${output_variable}
                  variable: Flow.balance
              outputs:
                success:
                  actions:
                    - playAudio:
                        name: Play Balance
                        audio:
                          tts: "Your account balance is " + ToString(Flow.balance)
                    - disconnect:
                        name: Disconnect
                failure:
                  actions:
                    - playAudio:
                        name: Play Error
                        audio:
                          tts: "I'm sorry, I couldn't retrieve your account balance. Please try again later."
                    - disconnect:
                        name: Disconnect
